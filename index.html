<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-End Interactive Waterfall of Light</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000000; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';

        // --------------------------------------------------------
        // 1. 초기 설정
        // --------------------------------------------------------
        const PARTICLE_COUNT = 100000; // 기존 50만 개의 20% 수준으로 조정
        const WATERFALL_WIDTH = 50;
        const WATERFALL_HEIGHT = 70;
        const WATERFALL_DEPTH = 20;
        
        const clock = new THREE.Clock();
        const pointer = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        
        // 인터랙션용 투명 평면 (클릭/터치 감지)
        const planeGeometry = new THREE.PlaneGeometry(200, 200);
        const planeMaterial = new THREE.MeshBasicMaterial({ visible: false });
        const interactionPlane = new THREE.Mesh(planeGeometry, planeMaterial);

        // --------------------------------------------------------
        // 2. 씬, 카메라, 렌더러
        // --------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.add(interactionPlane);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 45);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------
        // 3. 메가 쉐이더
        // --------------------------------------------------------
        const vertexShader = `
            uniform float uTime;
            uniform vec3 uImpactPos;
            uniform float uImpactTime;
            
            attribute vec3 aOffset;
            attribute float aPhase;
            attribute float aScale;

            varying vec3 vColor;
            varying float vAlpha;

            // Simplex Noise
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            float snoise(vec3 v){ 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                
                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
                
                i = mod(i, 289.0 ); 
                vec4 p = permute( permute( permute( 
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                          + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                          + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 1.0/7.0;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            float fbm(vec3 p) {
                float v = 0.0; float a = 0.5; vec3 shift = vec3(100.0);
                mat3 rot = mat3(cos(0.5), sin(0.5), 0.0, -sin(0.5), cos(0.5), 0.0, 0.0, 0.0, 1.0);
                for (int i = 0; i < 4; i++) {
                    v += a * snoise(p); p = rot * p * 2.0 + shift; a *= 0.5;
                }
                return v;
            }

            void main() {
                float fallSpeed = 0.03;
                float life = fract(aPhase - uTime * fallSpeed);
                vec3 pos = aOffset;
                pos.y = ${WATERFALL_HEIGHT.toFixed(1)} / 2.0 - life * ${WATERFALL_HEIGHT.toFixed(1)};

                // 덩어리감 (Clumping)
                float clumpingNoise = fbm(vec3(pos.x * 0.05, pos.y * 0.02, uTime * 0.05));
                float noiseClump = smoothstep(0.0, 0.4, abs(clumpingNoise));
                pos.x += noiseClump * sign(clumpingNoise) * 2.0;
                pos.z += noiseClump * sign(clumpingNoise) * 1.0;
                
                float flowNoise = fbm(vec3(pos.x * 0.1, pos.y * 0.1, uTime * 0.1));
                pos.x += flowNoise * 0.5;

                // 타격 인터랙션 바운스
                float timeSinceImpact = uTime - uImpactTime;
                float flash = 0.0;
                
                if (timeSinceImpact > 0.0 && timeSinceImpact < 2.5) {
                    float dist = length(pos - uImpactPos);
                    float impactRadius = 5.0;
                    
                    if (dist < impactRadius) {
                        float force = smoothstep(impactRadius, 0.0, dist) * 2.5;
                        vec3 dir = normalize(pos - uImpactPos + vec3(0.0, 2.0, 0.0)); 
                        float splashAnim = exp(-timeSinceImpact * 3.0) * sin(timeSinceImpact * 10.0);
                        pos += dir * force * splashAnim * 6.0;
                        flash = force * exp(-timeSinceImpact * 4.0);
                    }
                }

                // 빛의 실선 형태
                vec3 scaledPosition = position;
                scaledPosition.x *= 0.06; // 실선 두께
                scaledPosition.y *= aScale * 6.0; // 실선 길이
                vec3 finalPos = pos + scaledPosition;

                // 컬러톤
                vec3 deepBlue = vec3(0.01, 0.05, 0.3); 
                vec3 cyan = vec3(0.0, 0.7, 1.0);      
                vec3 magenta = vec3(0.6, 0.1, 0.4);   

                float colorNoise = fbm(vec3(pos.x * 0.1, pos.y * 0.05, uTime * 0.05));
                float colorMixFactor = smoothstep(-0.5, 0.5, colorNoise);
                vec3 baseColor = mix(cyan, deepBlue, colorMixFactor);
                vec3 finalColor = mix(baseColor, magenta, smoothstep(0.7, 1.0, colorMixFactor));

                vColor = mix(finalColor, vec3(1.0, 1.0, 1.0), flash);
                
                float fadeOut = smoothstep(0.0, 0.1, life) * smoothstep(1.0, 0.8, life);
                vAlpha = fadeOut * 0.8;

                vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                gl_FragColor = vec4(vColor, vAlpha);
            }
        `;

        // --------------------------------------------------------
        // 4. InstancedMesh 생성
        // --------------------------------------------------------
        const geometry = new THREE.PlaneGeometry(0.5, 1.0);
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uImpactPos: { value: new THREE.Vector3(0, -999, 0) },
                uImpactTime: { value: -999 }
            },
            transparent: true,
            depthWrite: false, 
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });

        const instancedMesh = new THREE.InstancedMesh(geometry, material, PARTICLE_COUNT);
        
        instancedMesh.frustumCulled = false; 

        const offsets = new Float32Array(PARTICLE_COUNT * 3);
        const phases = new Float32Array(PARTICLE_COUNT);
        const scales = new Float32Array(PARTICLE_COUNT);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            offsets[i * 3 + 0] = (Math.random() - 0.5) * WATERFALL_WIDTH;
            offsets[i * 3 + 1] = (Math.random() - 0.5) * WATERFALL_HEIGHT;
            offsets[i * 3 + 2] = (Math.random() - 0.5) * WATERFALL_DEPTH;
            phases[i] = Math.random(); 
            scales[i] = Math.random() * 0.5 + 0.5; 
            instancedMesh.setMatrixAt(i, new THREE.Matrix4());
        }

        geometry.setAttribute('aOffset', new THREE.InstancedBufferAttribute(offsets, 3));
        geometry.setAttribute('aPhase', new THREE.InstancedBufferAttribute(phases, 1));
        geometry.setAttribute('aScale', new THREE.InstancedBufferAttribute(scales, 1));

        scene.add(instancedMesh);

        // --------------------------------------------------------
        // 5. 인터랙션 이벤트
        // --------------------------------------------------------
        function onInteract(event) {
            let clientX, clientY;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX; clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX; clientY = event.clientY;
            }

            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(interactionPlane);

            if (intersects.length > 0) {
                material.uniforms.uImpactPos.value.copy(intersects[0].point);
                material.uniforms.uImpactTime.value = material.uniforms.uTime.value;
            }
        }

        window.addEventListener('click', onInteract);
        window.addEventListener('touchstart', onInteract, { passive: false });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------
        // 6. 렌더 루프
        // --------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
