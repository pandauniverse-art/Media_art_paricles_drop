<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Panda Universe - The Reality Tear</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        
        /* 3D 우주 배경 레이어 (가장 뒤) */
        #webgl-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* 2D 하얀색 웹사이트 레이어 (찢어지는 캔버스, 가장 앞) */
        #overlay-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            cursor: crosshair;
        }

        /* 안내 문구 (최상단) */
        #hint {
            position: fixed;
            bottom: 30px; width: 100%; text-align: center;
            color: #000; font-size: 12px; letter-spacing: 3px; font-weight: bold;
            z-index: 3; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>
    
    <canvas id="overlay-canvas"></canvas>
    
    <div id="hint">DRAG TO TEAR THE REALITY</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ========================================================
        // 1. WebGL 3D 우주 배경 (심연) 셋업
        // ========================================================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        // 카메라에 패럴랙스(시차) 효과를 주기 위해 초기 Z값 설정
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.z = 1000;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 은하수 파티클 셋업
        const particleCount = 30000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        const colorPalette = [
            new THREE.Color(0x00aaff), // 네온 블루
            new THREE.Color(0xaa00ff), // 퍼플
            new THREE.Color(0xffffff)  // 화이트
        ];

        for (let i = 0; i < particleCount; i++) {
            // 중앙을 중심으로 나선형 은하수 형태 배치
            const radius = 200 + Math.random() * 3000;
            const theta = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 1000 * (1.0 - radius/3000); // 렌즈 형태
            
            positions[i * 3] = Math.cos(theta) * radius;
            positions[i * 3 + 1] = yOffset;
            positions[i * 3 + 2] = Math.sin(theta) * radius;

            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;

            sizes[i] = Math.random() * 2.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // 반짝이는 별 쉐이더 매테리얼
        const material = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0.0 } },
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = size * (1000.0 / -mvPosition.z);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    float alpha = 1.0 - (dist * 2.0);
                    gl_FragColor = vec4(vColor, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true
        });

        const starSystem = new THREE.Points(geometry, material);
        scene.add(starSystem);

        // ========================================================
        // 2. HTML5 Canvas 2D 오버레이 (찢어지는 평면) 셋업
        // ========================================================
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // 3D 패럴랙스용 마우스 타겟 좌표
        let targetMouseX = 0;
        let targetMouseY = 0;
        let cameraX = 0;
        let cameraY = 0;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 캔버스 렌더링 리셋 (새 하얀 도화지)
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 텍스트 (타이포그래피) 배치
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 메인 타이틀
            ctx.font = '900 min(8vw, 120px) "Helvetica Neue", Arial, sans-serif';
            ctx.fillText('PANDA UNIVERSE', centerX, centerY - 20);
            
            // 서브 타이틀
            ctx.font = 'bold min(2vw, 24px) "Helvetica Neue", Arial, sans-serif';
            ctx.fillStyle = '#555555';
            ctx.fillText('3D MOTION GRAPHICS & MEDIA ART', centerX, centerY + 60);
            
            // "지우개 모드"로 전환 (드래그 시 캔버스가 투명해지도록 설정)
            ctx.globalCompositeOperation = 'destination-out';
        }
        initCanvas();

        // 거친 종이가 찢어지는 듯한 브러시 로직
        function drawTear(x, y) {
            hint.style.opacity = '0'; // 힌트 숨기기
            
            // 메인 찢김 선 (굵고 둥글게)
            ctx.beginPath();
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = 100 + Math.random() * 60; // 두께를 무작위로 하여 거칠게 표현
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            // 찢어진 단면의 잔여물(노이즈) 브러시
            for (let i = 0; i < 15; i++) {
                const offsetX = (Math.random() - 0.5) * 180;
                const offsetY = (Math.random() - 0.5) * 180;
                const radius = Math.random() * 20 + 5;
                
                ctx.beginPath();
                ctx.arc(x + offsetX, y + offsetY, radius, 0, Math.PI * 2);
                ctx.fill();
            }

            lastX = x;
            lastY = y;
        }

        // ========================================================
        // 3. 이벤트 리스너 (마우스 & 터치 동기화)
        // ========================================================
        function handleStart(x, y) {
            isDrawing = true;
            lastX = x;
            lastY = y;
            updateParallaxTarget(x, y);
            drawTear(x, y); // 클릭한 곳부터 구멍 내기
        }

        function handleMove(x, y) {
            updateParallaxTarget(x, y);
            if (isDrawing) {
                drawTear(x, y);
            }
        }

        function handleEnd() {
            isDrawing = false;
        }

        function updateParallaxTarget(x, y) {
            // 중심 기준 -1 ~ 1 로 정규화
            targetMouseX = (x - window.innerWidth / 2) * 0.002;
            targetMouseY = (y - window.innerHeight / 2) * 0.002;
        }

        // 마우스 이벤트
        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);

        // 터치 이벤트 (모바일 지원)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // 리사이즈
        window.addEventListener('resize', () => {
            // WebGL 리사이즈
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Canvas 2D 초기화
            initCanvas();
            hint.style.opacity = '1';
        });

        // ========================================================
        // 4. 애니메이션 루프 (3D 우주 회전 & 패럴랙스)
        // ========================================================
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;

            // 1. 은하수 전체의 아주 느린 자전
            starSystem.rotation.y = time * 0.2;
            starSystem.rotation.z = time * 0.1;

            // 2. 찢어진 틈새로 보는 공간감을 극대화하는 패럴랙스(시차) 로직
            cameraX += (targetMouseX * 800 - cameraX) * 0.05;
            cameraY += (-targetMouseY * 800 - cameraY) * 0.05;
            
            camera.position.x = cameraX;
            camera.position.y = cameraY;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
