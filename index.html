<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterfall of Light - Interactive Media Art</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000; /* 완전한 칠흑 */
            touch-action: none; /* 모바일 브라우저 스크롤 방지 */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';

        // --------------------------------------------------------
        // 1. 초기 설정 및 변수 선언 (Hoisting 방지를 위한 엄격한 순서)
        // --------------------------------------------------------
        const PARTICLE_COUNT = 1200000; // 120만 개 (100만~150만 사이 최적화)
        const WATERFALL_WIDTH = 40;
        const WATERFALL_HEIGHT = 60;
        const WATERFALL_DEPTH = 15;
        
        const clock = new THREE.Clock();
        const pointer = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        
        // 인터랙션을 위한 보이지 않는 충돌 평면
        const planeGeometry = new THREE.PlaneGeometry(100, 100);
        const planeMaterial = new THREE.MeshBasicMaterial({ visible: false });
        const interactionPlane = new THREE.Mesh(planeGeometry, planeMaterial);

        // --------------------------------------------------------
        // 2. 씬, 카메라, 렌더러 셋업
        // --------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.add(interactionPlane);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 성능을 위해 픽셀 비율 제한
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------
        // 3. 쉐이더 코드 작성 (Mega Shader)
        // --------------------------------------------------------
        const vertexShader = `
            uniform float uTime;
            uniform vec3 uImpactPos;
            uniform float uImpactTime;
            
            attribute vec3 aOffset;
            attribute float aPhase;
            attribute float aScale;

            varying vec3 vColor;
            varying float vAlpha;

            // Simplex 3D Noise function (fBM 구현용)
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            float snoise(vec3 v){ 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
                i = mod(i, 289.0 ); 
                vec4 p = permute( permute( permute( 
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                          + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                          + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 1.0/7.0;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                            dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                // 1. 기본 낙하 연산 (느리고 웅장하게, 기본 속도의 30% 수준)
                float fallSpeed = 0.03;
                float life = fract(aPhase - uTime * fallSpeed);
                
                vec3 pos = aOffset;
                // 위에서 아래로 떨어지도록 Y 좌표 재계산
                pos.y = ${WATERFALL_HEIGHT.toFixed(1)} / 2.0 - life * ${WATERFALL_HEIGHT.toFixed(1)};

                // 2. fBM 노이즈를 통한 덩어리감 및 물결(Flow) 연산
                // Y축 위치와 시간에 기반하여 X, Z 축으로 일렁이게 만듦
                float noiseScale = 0.15;
                float n1 = snoise(vec3(pos.x * noiseScale, pos.y * noiseScale, uTime * 0.1));
                float n2 = snoise(vec3(pos.x * noiseScale + 10.0, pos.y * noiseScale, uTime * 0.1));
                
                pos.x += n1 * 1.5;
                pos.z += n2 * 1.5;

                // 3. 인터랙션: 돌에 부딪히는 물보라(Splash)
                float timeSinceImpact = uTime - uImpactTime;
                float flash = 0.0;
                
                if (timeSinceImpact > 0.0 && timeSinceImpact < 2.5) {
                    float dist = length(pos - uImpactPos);
                    float impactRadius = 4.0;
                    
                    if (dist < impactRadius) {
                        // 바위에 부딪혀 위와 양옆으로 솟구치는 물리력
                        float force = (impactRadius - dist) / impactRadius;
                        
                        // 바깥쪽(X, Z)과 위쪽(Y)으로 튕겨나가는 벡터
                        vec3 dir = normalize(pos - uImpactPos + vec3(0.0, 2.0, 0.0)); 
                        
                        // 바운스 및 감쇠 애니메이션
                        float splashAnim = exp(-timeSinceImpact * 2.0) * sin(timeSinceImpact * 8.0);
                        
                        pos += dir * force * splashAnim * 3.0;
                        
                        // 타격감(Flash) - 충돌 직후 가장 밝고 서서히 감쇠
                        flash = force * exp(-timeSinceImpact * 3.0);
                    }
                }

                // 4. 형태 변형: 빛의 실선(Streak) 만들기
                // InstancedMesh의 기본 형태를 세로로 길게 늘림
                vec3 scaledPosition = position;
                scaledPosition.x *= 0.1; // 가로는 얇게
                scaledPosition.y *= aScale * 2.0; // 세로는 길게
                
                vec3 finalPos = pos + scaledPosition;

                // 5. 컬러 톤앤매너 설정 (Deep Blue, Cyan, Magenta)
                vec3 deepBlue = vec3(0.01, 0.05, 0.2);
                vec3 cyan = vec3(0.0, 0.6, 1.0);
                vec3 magenta = vec3(0.7, 0.1, 0.5);

                // 노이즈를 활용한 자연스러운 색상 믹스
                float colorMix = snoise(vec3(pos.x * 0.1, pos.y * 0.05, uTime * 0.05));
                vec3 baseColor = mix(deepBlue, cyan, smoothstep(-0.5, 0.5, colorMix));
                vec3 finalColor = mix(baseColor, magenta, smoothstep(0.6, 1.0, colorMix));

                // 타격 시 하얗게 번쩍이는(Flash) 효과 합성
                vColor = mix(finalColor, vec3(1.0, 1.0, 1.0), flash);
                
                // 위아래 경계선에서 자연스럽게 페이드 인/아웃
                vAlpha = smoothstep(0.0, 0.1, life) * smoothstep(1.0, 0.8, life) * 0.6;

                vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                // 부드러운 파티클 질감 (가장자리 페이드 아웃)
                vec2 uv = gl_PointCoord; // if using points, or local uv if using mesh
                float edge = 1.0 - smoothstep(0.0, 0.5, abs(vAlpha));
                
                gl_FragColor = vec4(vColor, vAlpha);
            }
        `;

        // --------------------------------------------------------
        // 4. 파티클(InstancedMesh) 생성 및 데이터 할당
        // --------------------------------------------------------
        // 세로로 긴 실선 형태를 만들기 위한 기본 평면 지오메트리
        const geometry = new THREE.PlaneGeometry(0.5, 3.0);
        
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uImpactPos: { value: new THREE.Vector3(0, -999, 0) },
                uImpactTime: { value: -999 }
            },
            transparent: true,
            depthWrite: false, // Additive Blending을 위한 필수 설정
            blending: THREE.AdditiveBlending, // 파티클이 겹칠수록 밝게 타오름
            side: THREE.DoubleSide
        });

        const instancedMesh = new THREE.InstancedMesh(geometry, material, PARTICLE_COUNT);

        // Instancing 속성 데이터 초기화
        const offsets = new Float32Array(PARTICLE_COUNT * 3);
        const phases = new Float32Array(PARTICLE_COUNT);
        const scales = new Float32Array(PARTICLE_COUNT);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // 폭포의 체적 내에서 무작위 위치 설정
            const x = (Math.random() - 0.5) * WATERFALL_WIDTH;
            const y = (Math.random() - 0.5) * WATERFALL_HEIGHT;
            const z = (Math.random() - 0.5) * WATERFALL_DEPTH;
            
            offsets[i * 3 + 0] = x;
            offsets[i * 3 + 1] = y;
            offsets[i * 3 + 2] = z;

            phases[i] = Math.random(); // 애니메이션 위상차
            scales[i] = Math.random() * 0.5 + 0.5; // 실선의 길이 편차
            
            // 더미 매트릭스 세팅 (위치는 쉐이더에서 계산하므로 Identity 유지)
            const matrix = new THREE.Matrix4();
            instancedMesh.setMatrixAt(i, matrix);
        }

        geometry.setAttribute('aOffset', new THREE.InstancedBufferAttribute(offsets, 3));
        geometry.setAttribute('aPhase', new THREE.InstancedBufferAttribute(phases, 1));
        geometry.setAttribute('aScale', new THREE.InstancedBufferAttribute(scales, 1));

        scene.add(instancedMesh);

        // --------------------------------------------------------
        // 5. 인터랙션 이벤트 처리
        // --------------------------------------------------------
        function onInteract(event) {
            let clientX, clientY;
            
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            // 정규화된 마우스 좌표 계산 (-1 ~ +1)
            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;

            // 카메라에서 마우스 위치로 레이캐스팅
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(interactionPlane);

            if (intersects.length > 0) {
                // 충돌 좌표와 현재 시간을 쉐이더로 전달
                material.uniforms.uImpactPos.value.copy(intersects[0].point);
                material.uniforms.uImpactTime.value = material.uniforms.uTime.value;
            }
        }

        window.addEventListener('click', onInteract);
        window.addEventListener('touchstart', onInteract, { passive: false });

        // --------------------------------------------------------
        // 6. 리사이즈 대응
        // --------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------
        // 7. 메인 렌더 루프
        // --------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);
            
            // 쉐이더에 경과 시간 전달
            material.uniforms.uTime.value = clock.getElapsedTime();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
