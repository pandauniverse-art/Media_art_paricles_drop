<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Panda Universe - The Reality Tear (UPGRADED Vibe & Ink Spread)</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        
        /* 3D 우주 배경 레이어 */
        #webgl-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* 2D 하얀색 웹사이트 레이어 (번지는 캔버스) */
        #overlay-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            cursor: crosshair;
        }

        /* 안내 문구 (최상단) */
        #hint {
            position: fixed;
            bottom: 30px; width: 100%; text-align: center;
            color: #000; font-size: 12px; letter-spacing: 3px; font-weight: bold;
            z-index: 3; pointer-events: none; transition: opacity 0.5s;
        }

        /* 에러를 화면에 표시하는 헬퍼 함수 스타일 */
        #error-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8); color: #fff; z-index: 9999; font-family: monospace; padding: 10px; display: none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="webgl-container"></div>
    <canvas id="overlay-canvas"></canvas>
    <div id="hint">CLICK TO SPREAD THE INK OF REALITY</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 에러를 화면에 표시하는 헬퍼 함수
        window.onerror = function(msg, url, line) {
            var errDiv = document.getElementById('error-log');
            errDiv.style.display = 'block';
            errDiv.innerHTML += msg + ' (Line: ' + line + ')<br>';
            return false;
        };

        // 오디오 에러(404)를 무시하는 안전한 실행 함수
        function safeAudioPlay(audio, volume) {
            if (audio) {
                audio.volume = volume || 1.0;
                audio.currentTime = 0;
                var promise = audio.play();
                if (promise !== undefined) { promise.catch(function(e) {}); }
            }
        }
        function safeAudioPause(audio) {
            if (audio) { audio.pause(); audio.currentTime = 0; }
        }

        let chargeAudio = new Audio('charge.mp3'); chargeAudio.loop = true;
        let glitchAudio = new Audio('glitch.mp3'); glitchAudio.loop = true;

        // ========================================================
        // 1. WebGL 3D 우주 배경 (심연) 셋업
        // ========================================================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 15000);
        camera.position.z = 2500; // 카메라를 좀 더 뒤로 빼서 광활한 우주를 조망

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // 모바일 발열 방지
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 전체 은하 그룹
        const galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);

        // ========================================================
        // UPGRADE: 15만 개의 SDF 하이퀄리티 별 시스템
        // ========================================================
        const particleCount = 150000;
        const starGeom = new THREE.BufferGeometry();
        const starPos = new Float32Array(particleCount * 3);
        const starColors = new Float32Array(particleCount * 3);
        const starSizes = new Float32Array(particleCount);

        const starColorPalette = [
            new THREE.Color(0xaabbff), // 푸른 별
            new THREE.Color(0xffffee), // 흰색 별
            new THREE.Color(0xffddaa)  // 노란 별
        ];

        for (let i = 0; i < particleCount; i++) {
            // 거대한 나선 은하 형태 배치
            const radius = 300 + Math.random() * 8000;
            const theta = Math.random() * Math.PI * 2 + (radius * 0.0005); // 나선형 회전
            const yOffset = (Math.random() - 0.5) * 800 * (1.0 - radius/8000); // 중앙으로 갈수록 두꺼움
            
            starPos[i * 3] = Math.cos(theta) * radius;
            starPos[i * 3 + 1] = yOffset;
            starPos[i * 3 + 2] = Math.sin(theta) * radius;

            const color = starColorPalette[Math.floor(Math.random() * starColorPalette.length)];
            starColors[i * 3] = color.r;
            starColors[i * 3 + 1] = color.g;
            starColors[i * 3 + 2] = color.b;

            starSizes[i] = 1.0 + Math.random() * 4.0;
        }

        starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeom.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        starGeom.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

        // 고퀄리티 SDF 별 쉐이더 매테리얼
        const starMaterial = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0.0 } },
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    // 외곽으로 갈수록 작아지게
                    float depthDist = length(mvPosition.xyz);
                    gl_PointSize = size * (2000.0 / depthDist) * (1.0 + sin(position.x + uTime * 2.0) * 0.1); 
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    // SDF 기반의 완벽한 원형 & 글로우 효과
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    // 중앙은 밝고 외곽은 부드럽게 퍼짐
                    float alpha = pow(1.0 - (dist * 2.0), 2.0);
                    gl_FragColor = vec4(vColor, alpha * 0.9);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true
        });

        const starSystem = new THREE.Points(starGeom, starMaterial);
        galaxyGroup.add(starSystem);

        // ========================================================
        // UPGRADE: 절차적 노이즈 네뷸라 (성운) 시스템
        // ========================================================
        const nebulaCount = 6;
        const nebulaColors = [
            [0.2, 0.0, 0.5], // 퍼플 심연
            [0.0, 0.3, 0.6], // 블루 심연
            [0.4, 0.1, 0.6]  // 마젠타 심연
        ];

        for (let i = 0; i < nebulaCount; i++) {
            const geom = new THREE.SphereGeometry(2000 + i * 500, 64, 64);
            const color = nebulaColors[i % nebulaColors.length];
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uColor: { value: new THREE.Vector3(color[0], color[1], color[2]) }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec3 uColor;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    // GPU 전용 노이즈 함수 (fBM)
                    float hash(float n) { return fract(sin(n) * 753.5453123); }
                    float noise(in vec3 x) {
                        vec3 p = floor(x);
                        vec3 f = fract(x);
                        f = f*f*(3.0-2.0*f);
                        float n = p.x + p.y*157.0 + 113.0*p.z;
                        return mix(mix(mix(hash(n+0.0), hash(n+1.0),f.x),
                                       mix(hash(n+157.0), hash(n+158.0),f.x),f.y),
                                   mix(mix(hash(n+113.0), hash(n+114.0),f.x),
                                       mix(hash(n+270.0), hash(n+271.0),f.x),f.y),f.z);
                    }
                    float fbm(vec3 p) {
                        float f = 0.0;
                        f += 0.5000*noise(p); p = p*2.02;
                        f += 0.2500*noise(p); p = p*2.03;
                        f += 0.1250*noise(p); p = p*2.01;
                        f += 0.0625*noise(p);
                        return f / 0.9375;
                    }

                    void main() {
                        // 성운의 흐름
                        vec3 p = vPosition * 0.001 + vec3(uTime * 0.05, 0.0, uTime * 0.03);
                        float nebulaIntensity = fbm(p);
                        
                        // 가장자리로 갈수록 투명하게 (프레넬)
                        float dotProduct = dot(vNormal, vec3(0.0, 0.0, 1.0));
                        float fresnel = pow(1.0 - max(0.0, dotProduct), 3.0);
                        
                        // 성운 색상 조합
                        vec3 col = uColor * nebulaIntensity * 1.5;
                        float alpha = (nebulaIntensity - 0.2) * 1.2; // 노이즈 컷오프
                        
                        // 몽환적인 글로우
                        col += vec3(1.0, 0.8, 1.0) * fresnel * nebulaIntensity * 0.5;
                        alpha *= (1.0 - fresnel * 0.8);

                        if(alpha < 0.0) discard;
                        gl_FragColor = vec4(pow(col, vec3(1.0/2.2)), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.BackSide // 안쪽에서 성운을 바라보게
            });
            const nebulaSphere = new THREE.Mesh(geom, mat);
            // 각 성운 층마다 미세하게 다른 회전축 세팅
            nebulaSphere.rotation.x = Math.random() * Math.PI;
            nebulaSphere.rotation.y = Math.random() * Math.PI;
            galaxyGroup.add(nebulaSphere);
        }

        // ========================================================
        // UPGRADE: 블랙홀 & 가스 원반 (Accretion Disk) 시스템
        // ========================================================
        const blackHoleGroup = new THREE.Group();
        blackHoleGroup.position.set(0, 0, -200); // 찢어진 틈새 바로 뒤에 배치
        galaxyGroup.add(blackHoleGroup);

        // 1. 사건의 지평선 (완전한 블랙 구체)
        const singularityGeom = new THREE.SphereGeometry(150, 64, 64);
        const singularityMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const singularity = new THREE.Mesh(singularityGeom, singularityMat);
        blackHoleGroup.add(singularity);

        // 2. 가스 원반 (Accretion Disk) - 쉐이더 기반
        const diskGeom = new THREE.RingGeometry(180, 800, 128);
        diskGeom.rotateX(-Math.PI * 0.45); // 살짝 눞힘
        const diskMat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0.0 } },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vPosition;
                void main() {
                    vUv = uv;
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float uTime;
                varying vec2 vUv;
                varying vec3 vPosition;

                void main() {
                    // SDF 기반 원반 질감
                    float dist = length(vPosition.xz);
                    float disk_width = 800.0;
                    float inner_rad = 180.0;
                    
                    // 나선형 소용돌이 질감
                    float angle = atan(vPosition.z, vPosition.x);
                    float swirl = sin(angle * 4.0 - uTime * 8.0 + dist * 0.02) * 0.5 + 0.5;
                    
                    // 색상 스펙트럼 (블랙홀 가장자리는 하얗게, 외곽은 주황빛)
                    float intensity = pow(1.0 - (dist - inner_rad) / (disk_width - inner_rad), 2.0);
                    vec3 col = mix(vec3(1.0, 0.6, 0.2), vec3(1.0, 0.9, 0.8), intensity * 0.8);
                    
                    // 질감 조합
                    col *= (0.7 + swirl * 0.3);
                    
                    // 안쪽과 외곽의 부드러운 빛바램
                    float alpha = mix(0.0, 1.0, smoothstep(inner_rad, inner_rad+50.0, dist));
                    alpha *= mix(1.0, 0.0, smoothstep(disk_width-200.0, disk_width, dist));

                    gl_FragColor = vec4(pow(col, vec3(1.0/2.2)), alpha * intensity * 0.9);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide
        });
        const accretionDisk = new THREE.Mesh(diskGeom, diskMat);
        blackHoleGroup.add(accretionDisk);

        // ========================================================
        // 2. HTML5 Canvas 2D 오버레이 (번지는 평면) 셋업
        // ========================================================
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let cameraX = 0, cameraY = 0;

        // 잉크 번짐 객체 배열
        const inkSpreads = [];
        class InkSpread {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 1;
                this.growthRate = 15; // 번지는 속도
                this.opacity = 1.0; // 투명도
            }
            update() {
                this.radius += this.growthRate;
                this.opacity -= 0.01; // 점점 투명해짐
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const centerX = canvas.width / 2, centerY = canvas.height / 2;

            // 메인 타이틀
            ctx.font = '900 min(8vw, 120px) "Helvetica Neue", Arial, sans-serif';
            ctx.fillText('PANDA UNIVERSE', centerX, centerY - 20);
            
            // 서브 타이틀
            ctx.font = 'bold min(2vw, 24px) "Helvetica Neue", Arial, sans-serif';
            ctx.fillStyle = '#555555';
            ctx.fillText('3D MOTION GRAPHICS & MEDIA ART', centerX, centerY + 60);
            
            // destinations-out 모드를클릭 후 번짐 효과 그리기 전용으로 사용
            ctx.globalCompositeOperation = 'destination-out';
        }
        initCanvas();

        // 잉크 번짐 효과 그리기 로직
        function handleInkSpreads() {
            if (inkSpreads.length > 0) {
                for (let i = inkSpreads.length - 1; i >= 0; i--) {
                    let is = inkSpreads[i];
                    is.update();

                    ctx.beginPath();
                    // SDF 기반의 완벽한 원형 그라데이션
                    let gradient = ctx.createRadialGradient(is.x, is.y, 0, is.x, is.y, is.radius);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${is.opacity})`);
                    gradient.addColorStop(0.5, `rgba(255, 255, 255, ${is.opacity * 0.8})`);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = gradient;
                    ctx.arc(is.x, is.y, is.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // 투명도가 0이 되면 배열에서 제거
                    if (is.opacity <= 0) {
                        inkSpreads.splice(i, 1);
                    }
                }
            }
        }

        // 거친 종이가 찢어지는 듯한 브러시 로직 (클릭 시 잉크 번짐 효과 추가)
        function drawTear(x, y) {
            hint.style.opacity = '0'; // 힌트 숨기기
            
            // 잉크 번짐 객체 추가
            inkSpreads.push(new InkSpread(x, y));

            ctx.beginPath();
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.lineWidth = 100 + Math.random() * 60; // 두께 무작위로 하여 거칠게
            ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();

            // 찢어진 단면 노이즈 브러시
            for (let i = 0; i < 15; i++) {
                const offsetX = (Math.random() - 0.5) * 180, offsetY = (Math.random() - 0.5) * 180;
                const radius = Math.random() * 20 + 5;
                ctx.beginPath(); ctx.arc(x + offsetX, y + offsetY, radius, 0, Math.PI * 2); ctx.fill();
            }
            lastX = x; lastY = y;
        }

        // ========================================================
        // 3. 이벤트 리스너 (마우스 & 터치 동기화)
        // ========================================================
        function handleStart(x, y) { isDrawing = true; lastX = x; lastY = y; updateParallaxTarget(x, y); drawTear(x, y); }
        function handleMove(x, y) { updateParallaxTarget(x, y); if (isDrawing) { drawTear(x, y); } }
        function handleEnd() { isDrawing = false; }
        function updateParallaxTarget(x, y) { targetMouseX = (x - window.innerWidth / 2) * 0.002; targetMouseY = (y - window.innerHeight / 2) * 0.002; }

        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchend', handleEnd);

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); initCanvas(); hint.style.opacity = '1'; });

        // ========================================================
        // 4. 애니메이션 루프 (우주 자전 & 패럴랙스)
        // ========================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();

            // 1. Uniforms 업데이트 (애니메이션 구동)
            starMaterial.uniforms.uTime.value = elapsedTime;
            diskMat.uniforms.uTime.value = elapsedTime;
            // 각 네뷸라 층마다 쉐이더 시간 전달
            galaxyGroup.children.forEach(child => {
                if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
                    child.material.uniforms.uTime.value = elapsedTime;
                }
            });

            // 2. 우주 자전 (매우 천천히)
            galaxyGroup.rotation.y = elapsedTime * 0.03;
            // 블랙홀 원반 자전 (더 빠르게)
            accretionDisk.rotation.z = -elapsedTime * 0.5;

            // 3. 캔버스 잉크 번짐 효과 갱신
            handleInkSpreads();

            // 4. 3D 패럴랙스(시차) 로직 (깊이감 극대화)
            cameraX += (targetMouseX * 1200 - cameraX) * 0.05; // 움직임 폭을 넓힘
            cameraY += (-targetMouseY * 1200 - cameraY) * 0.05;
            
            camera.position.x = cameraX;
            camera.position.y = cameraY;
            camera.lookAt(0, 0, -200); // 블랙홀을 바라봄

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
