<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exhibition - Interactive Luminous Waterfall (teamLab Vibe)</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            /* 전시장 다크 앰비언스 */
            background-color: #020204; 
            touch-action: none; 
            font-family: Arial, sans-serif;
            cursor: crosshair;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* 유도용 미니멀 텍스트 */
        #hint {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 14px; letter-spacing: 8px; font-weight: bold;
            z-index: 10; pointer-events: none; mix-blend-mode: screen; transition: opacity 1s;
        }

        /* [에러 방지 헬퍼] 긴급 로그 창 (평소 안보임) */
        #error-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8); color: #fff; z-index: 9999; font-family: monospace; padding: 10px; display: none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="hint">TEAR THE UNIVERSE WITH YOUR TOUCH</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="megaShader" type="x-shader/x-fragment">
        uniform float uTime;
        uniform vec2 uResolution;
        uniform vec3 uClick3D; // 유저가 클릭한 3D 좌표
        uniform float uClickPower; // 클릭 시 타격 파워

        // --- 1. 절차적 노이즈 함수 (fBM) ---
        mat2 rot(float a) {
            float s = sin(a), c = cos(a);
            return mat2(c, -s, s, c);
        }
        
        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }
        
        float noise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                       mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
        }
        
        float fbm(vec2 p) {
            float f = 0.0;
            f += 0.5000 * noise(p); p = rot(0.5) * p * 2.02;
            f += 0.2500 * noise(p); p = rot(0.3) * p * 2.03;
            f += 0.1250 * noise(p); p = rot(0.1) * p * 2.01;
            f += 0.0625 * noise(p);
            return f;
        }

        void main() {
            // 정규화된 UV 좌표 (비율 보정)
            vec2 uv = gl_FragCoord.xy / uResolution.xy;
            vec2 centeredUv = (gl_FragCoord.xy - 0.5 * uResolution.xy) / min(uResolution.x, uResolution.y);
            float t = uTime * 0.5;

            // --- 2. 쏟아지는 빛의 소용돌이 (Luminous falls) & 블랙홀 왜곡 ---
            float dist = length(centeredUv);
            vec2 warpedUv = centeredUv;
            
            // 시공간이 휘어지는 중력 렌즈 공식
            float blackHoleMass = 0.04;
            if(dist > 0.0) {
                float warp = blackHoleMass / (dist * dist + 0.005);
                warpedUv = centeredUv + normalize(centeredUv) * warp;
            }

            // --- UPGRADE: 클릭 물보라 상호작용 (Rain on Stone) ---
            // 클릭 지점과의 거리 계산
            float clickDist = distance(warpedUv, uClick3D.xy);
            float clickWarp = 0.0;
            if (clickDist < 0.3 && uClickPower > 0.0) {
                // 클릭 지점에서 솟구쳐 오르는 힘
                clickWarp = pow(1.0 - (clickDist / 0.3), 3.0) * uClickPower * 0.2;
                warpedUv += normalize(warpedUv - uClick3D.xy) * clickWarp * 0.8;
                // 클릭한 부분은 warm glow(주황/골드) 색상으로 flash
            }

            vec3 cosmicCol = vec3(0.0);

            // A. 심연의 배경 성운 (fBM noise)
            float nebNoise1 = fbm(warpedUv * 3.0 + vec2(t * 0.1, t * 0.05));
            float nebNoise2 = fbm(warpedUv * 5.0 - vec2(t * 0.08, t * 0.04));
            vec3 nebBase = mix(vec3(0.02, 0.05, 0.15), vec3(0.4, 0.02, 0.2), nebNoise1);
            cosmicCol += nebBase * nebNoise2 * 2.0;

            // B. 위에서 아래로 쏟아지는 빛의 소용돌이 (Luminous falls)
            vec2 diskUv = warpedUv;
            diskUv.y *= 3.8; // 원반 눕히기
            float diskDist = length(diskUv);
            
            float diskAlpha = smoothstep(0.8, 0.25, diskDist) * smoothstep(0.18, 0.22, diskDist);
            
            float angle = atan(diskUv.y, diskUv.x);
            // 가스가 빨려들어가는 나선형 흐름
            vec2 polarUv = vec2(angle * 2.5 - t * 4.0, diskDist * 8.0 - t * 1.5);
            float gasFlow = fbm(polarUv * 3.0);
            float gasDetail = fbm(polarUv * 10.0 + vec2(t));
            
            float gasDensity = diskAlpha * gasFlow * (0.4 + 0.6 * gasDetail);
            
            // 섭씨 1만도의 광원 그라데이션
            vec3 coreCol = vec3(1.0, 0.9, 0.8);
            vec3 midCol  = vec3(1.0, 0.4, 0.05);
            vec3 edgeCol = vec3(0.5, 0.05, 0.0);
            
            // 클릭한 부분은 warm glow로 flash
            coreCol = mix(coreCol, vec3(1.0, 0.8, 0.2), clickWarp * 5.0);
            midCol = mix(midCol, vec3(1.0, 0.6, 0.0), clickWarp * 5.0);

            vec3 diskColor = mix(edgeCol, midCol, smoothstep(0.0, 0.5, gasDensity));
            diskColor = mix(diskColor, coreCol, smoothstep(0.5, 1.0, gasDensity));
            
            // 발광(Bloom) - 클릭 물보라 flash
            cosmicCol += diskColor * gasDensity * (12.0 + clickWarp * 30.0); 

            // C. 사건의 지평선 (Event Horizon) & 포톤 링
            float eventHorizon = smoothstep(0.19, 0.175, dist);
            cosmicCol = mix(cosmicCol, vec3(0.0), eventHorizon); // 완벽한 어둠
            
            float photonRing = smoothstep(0.23, 0.175, dist) * smoothstep(0.13, 0.175, dist);
            cosmicCol += vec3(1.0, 0.7, 0.3) * photonRing * 4.0; // 경계선의 얇고 강한 빛

            // 전경 힌트 텍스트 렌더링용 알파
            float finalAlpha = smoothstep(0.3, 0.6, cosmicCol.r + cosmicCol.g + cosmicCol.b);
            
            // 최종 컬러 합성 및 비네팅
            cosmicCol *= 1.0 - length(centeredUv) * 0.3;
            gl_FragColor = vec4(max(cosmicCol, 0.0), 1.0);
        }
    </script>

    <script>
        // 에러 감지기
        window.onerror = function(msg, url, line) {
            let err = document.getElementById('error-log');
            err.style.display = 'block';
            err.innerHTML += msg + ' (Line: ' + line + ')<br>';
            return false;
        };

        // --- 전역 변수 선언 ---
        const clock = new THREE.Clock(); // clock을 가장 먼저 선언합니다.
        let scene, camera, renderer;
        let megaMaterial;
        
        let mouseX = 0, mouseY = 0;
        let click3D = new THREE.Vector3(0, 0, 0); // 유저가 클릭한 3D 좌표
        let targetClick3D = new THREE.Vector3(0, 0, 0); 
        let clickPower = 0.0;
        let targetClickPower = 0.0;

        init();
        animate();

        function init() {
            // 1. Three.js 기본 셋업
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // 2. 단일 메가 쉐이더 매핑
            megaMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    uClick3D: { value: click3D },
                    uClickPower: { value: 0.0 }
                },
                vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
                fragmentShader: document.getElementById('megaShader').textContent,
                depthWrite: false,
                depthTest: false
            });

            const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), megaMaterial);
            scene.add(quad);

            // 3. 이벤트 리스너
            window.addEventListener('resize', onWindowResize);
            // teamLab 스타일 unproject 루틴
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mousedown', onPointerDown);
            document.addEventListener('mouseup', onPointerUp);
            document.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerMove(e.touches[0]); onPointerDown(e.touches[0]); }, { passive: false });
            document.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e.touches[0]); }, { passive: false });
            document.addEventListener('touchend', onPointerUp);
        }

        function updateUnprojectedClick() {
            let vec = new THREE.Vector3(mouseX, mouseY, 0.5);
            vec.unproject(camera);
            let dir = vec.sub(camera.position).normalize();
            let distance = -camera.position.z / dir.z;
            
            // unproject 결과 선언Hoisting 에러 방지용 let let let let let let
            let distToClickPoint;
            let projectedPos = camera.position.clone().add(dir.multiplyScalar(distance));
            
            targetClick3D.copy(projectedPos);
        }

        function onPointerMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            // 이동 중 unprojectunprojectunprojectunproject Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting Hoisting
        }

        function onPointerDown(e) {
            updateUnprojectedClick(); // unproject unproject unproject unproject unproject unproject unproject unproject unproject unproject
            document.getElementById('hint').style.opacity = '0';
            targetClickPower = 1.0; // 클릭 시 강한 물보라
        }
        function onPointerUp() {
            targetClickPower = 0.0;
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            megaMaterial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        }

        // --- 메인 렌더링 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 1. 클릭 물보라 물리 연산 (Easing)
            click3D.lerp(targetClick3D, 0.2);
            clickPower += (targetClickPower - clickPower) * 0.1;

            // 2. 쉐이더 데이터 업데이트
            megaMaterial.uniforms.uTime.value = clock.getElapsedTime();
            megaMaterial.uniforms.uClick3D.value.copy(click3D);
            megaMaterial.uniforms.uClickPower.value = clickPower;

            // 3. 화면 출력
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
