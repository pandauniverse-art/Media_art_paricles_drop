<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exhibition - teamLab Waterfall Splash</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #000000; /* 전시장 완전한 어둠 */
            touch-action: none; 
            font-family: Arial, sans-serif;
        }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        
        #hint {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.5); font-size: 14px; letter-spacing: 8px; font-weight: bold;
            z-index: 10; pointer-events: none; mix-blend-mode: screen; transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="hint">CLICK TO SPLASH THE WATERFALL</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform vec3 uClickPos;
        uniform float uClickStrength;

        attribute vec3 aRandom; // x: 속도, y: 흔들림, z: 크기
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec3 pos = position;
            vColor = aColor;
            vAlpha = 1.0;

            // 1. 위에서 아래로 쏟아지는 폭포수 로직
            // 파티클마다 미세하게 다른 낙하 속도
            float fallSpeed = 200.0 + (aRandom.x * 400.0);
            pos.y -= uTime * fallSpeed;

            // 2. 무한 루프 (화면 아래로 사라지면 위에서 다시 나타남)
            pos.y = mod(pos.y + 1500.0, 3000.0) - 1500.0;

            // 3. 폭포수의 미세한 일렁임 (공기 저항/바람)
            pos.x += sin(uTime * 0.5 + pos.y * 0.005 + aRandom.y * 6.28) * 15.0;

            // 4. [핵심] 돌에 부딪히는 물보라 (Splash) 상호작용
            float distToClick = distance(pos.xy, uClickPos.xy);
            float effectRadius = 250.0; // 물보라가 튀는 반경

            if (distToClick < effectRadius && uClickStrength > 0.0) {
                // 클릭 중심부에 가까울수록 강한 반발력
                float force = pow(1.0 - (distToClick / effectRadius), 2.0) * uClickStrength;
                
                // 물방울이 튀어나가는 방향 계산
                vec3 splashDir = normalize(pos - uClickPos);
                // 폭포수가 바닥(돌)에 부딪혀 무조건 위로 솟구치도록 Y값을 강제 상향
                splashDir.y = abs(splashDir.y) + 0.8; 
                splashDir.z += 0.5; // 화면 앞으로 살짝 튀어나옴
                
                // 위치 튕겨내기
                pos += splashDir * force * 300.0;
                
                // 튀어오르는 물방울은 밝은 하얀색/핑크빛으로 발광
                vColor = mix(vColor, vec3(1.0, 0.9, 1.0), force);
                vAlpha = 1.0 + force; // 더 밝게
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 원근감에 따른 파티클 크기
            gl_PointSize = aRandom.z * (800.0 / -mvPosition.z);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            
            // 일반적인 둥근 점이 아니라 세로로 긴 '실선(Streak)' 형태로 깎아냄
            // X축을 심하게 압축시켜서 얇은 빗줄기 모양을 만듦
            float dist = length(vec2(uv.x * 6.0, uv.y * 1.2));
            
            if (dist > 0.5) discard;
            
            // 빛이 퍼지는 글로우 효과
            float glow = pow(1.0 - (dist * 2.0), 1.8);
            
            gl_FragColor = vec4(vColor, glow * vAlpha * 0.8);
        }
    </script>

    <script>
        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        
        // 인터랙션용 변수
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        let clickPos = new THREE.Vector3(0, -5000, 0); // 초기엔 화면 밖
        let clickStrength = 0.0;

        init();
        animate();

        function init() {
            // 1. 씬 및 카메라 설정
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0003); // 깊이감(심연)을 위한 검은 안개

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 캔버스 배경 완전한 블랙
            renderer.setClearColor(0x000000, 1.0); 
            document.body.appendChild(renderer.domElement);

            // 2. 15만 개의 폭포 파티클 생성
            const particleCount = 150000;
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            // 팀랩 Vibe 색상 (블루, 마젠타, 딥퍼플 위주)
            const colorPalette = [
                new THREE.Color(0x00aaff), // 라이트 블루
                new THREE.Color(0x2244ff), // 딥 블루
                new THREE.Color(0xff22aa), // 핫 핑크 / 마젠타
                new THREE.Color(0xffffff)  // 가끔 섞이는 화이트
            ];

            for (let i = 0; i < particleCount; i++) {
                // 전시 벽면을 채우도록 넓게 분포
                positions[i * 3] = (Math.random() - 0.5) * 3500; // X
                positions[i * 3 + 1] = (Math.random() - 0.5) * 3000; // Y
                positions[i * 3 + 2] = (Math.random() - 0.5) * 800;  // Z 깊이감

                // 랜덤 데이터 (낙하 속도, 흔들림, 크기)
                randoms[i * 3] = Math.random();
                randoms[i * 3 + 1] = Math.random();
                randoms[i * 3 + 2] = 2.0 + Math.random() * 8.0;

                // 색상
                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uClickPos: { value: clickPos },
                    uClickStrength: { value: 0.0 }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending, // 겹치면 밝게 빛남
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            // 3. 이벤트 리스너 세팅
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onPointerDown);
            document.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e.touches[0]); }, { passive: false });
        }

        // 마우스/터치 클릭 시 3D 좌표를 계산하여 물보라(Splash) 발생
        function onPointerDown(e) {
            document.getElementById('hint').style.opacity = '0';
            
            // 화면 좌표를 정규화 (-1 ~ 1)
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            // 카메라에서 마우스 방향으로 레이저를 쏴서 3D 공간의 클릭 좌표(Z=0 평면)를 찾음
            raycaster.setFromCamera(mouse, camera);
            let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            let intersectPoint = new THREE.Vector3();
            
            raycaster.ray.intersectPlane(plane, intersectPoint);
            
            if (intersectPoint) {
                clickPos.copy(intersectPoint);
                clickStrength = 1.0; // 물보라 힘 충전! (1.0 = 최대치)
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 물보라의 힘이 서서히 줄어듦 (퍼졌다가 가라앉는 느낌)
            if (clickStrength > 0.0) {
                clickStrength -= 0.02; // 서서히 감소
                if (clickStrength < 0) clickStrength = 0.0;
            }

            // 쉐이더로 데이터 갱신
            particleMaterial.uniforms.uTime.value = elapsedTime;
            particleMaterial.uniforms.uClickPos.value.copy(clickPos);
            particleMaterial.uniforms.uClickStrength.value = clickStrength;

            // 카메라가 미세하게 떠다니며 공간감을 줌
            camera.position.x = Math.sin(elapsedTime * 0.2) * 50;
            camera.position.y = Math.cos(elapsedTime * 0.1) * 30;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
